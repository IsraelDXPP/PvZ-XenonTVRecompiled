name: Android CI

on:
  push:
    paths-ignore:
      - '**/*.md'

  pull_request:
    paths-ignore:
      - '**/*.md'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: [ v111 ]
        build_type: [ release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout assets
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.ASSETS_REPO }}
          path: app/src/main/assets
          token: ${{ secrets.ASSETS_TOKEN }}
        continue-on-error: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}
          add-job-summary: on-failure

      - name: Decode keystore
        if: matrix.build_type == 'release'
        env:
          KEYSTORE_ENCODED: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_ENCODED" ]; then
            echo "$KEYSTORE_ENCODED" | base64 -d > app/keystore.jks
            echo "storeFile=keystore.jks" >> keystore.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
            echo "keyAlias=$KEY_ALIAS" >> keystore.properties
            echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
          fi

      - name: Build with Gradle
        env:
          VERSION: ${{ matrix.version }}
          BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          chmod +x gradlew
          ./gradlew assemble${VERSION^}${BUILD_TYPE^}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PvZ-TV-${{ matrix.version }}-${{ matrix.build_type }}
          path: app/build/outputs/apk/${{ matrix.version }}/${{ matrix.build_type }}/*.apk


